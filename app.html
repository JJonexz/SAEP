<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAEP</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">
<div class="barra">
    <h2>SAEP</h2>
    <div class="user-info" id="userInfo"></div>
    <a href="#" onclick="mostrar('dashboard')">Dashboard</a>
    <a href="#" id="linkEstudiantes" onclick="mostrar('estudiantes')">Estudiantes</a>
    <a href="#" id="linkMaterias" onclick="mostrar('materias')">Materias</a>
    <a href="#" id="linkNotas" onclick="mostrar('notas')">Calificaciones</a>
    <a href="#" onclick="salir()" style="color:#f66;margin-top:50px">Salir</a>
</div>
<div class="contenido">
    <div id="dashboard" class="seccion activa">
        <h2>Dashboard</h2>
        <p id="resumen"></p>
    </div>
    <div id="estudiantes" class="seccion">
        <h2>Estudiantes</h2>
        <div id="formEstudiantes">
            <input id="nombre" placeholder="Nombre">
            <input id="apellido" placeholder="Apellido">
            <input id="curso" placeholder="Curso">
            <button onclick="agregarEstudiante()">Agregar</button>
        </div>
        <ul id="listaEstudiantes"></ul>
    </div>
    <div id="materias" class="seccion">
        <h2>Materias</h2>
        <div id="formMaterias">
            <input id="nombreMateria" placeholder="Materia">
            <button onclick="agregarMateria()">Agregar</button>
        </div>
        <ul id="listaMaterias"></ul>
    </div>
    <div id="notas" class="seccion">
        <h2>Calificaciones</h2>
        <div id="formNotas">
            <select id="selEstudiante"></select>
            <select id="selMateria"></select>
            <input id="nota" type="number" placeholder="Nota">
            <button onclick="agregarNota()">Agregar</button>
        </div>
        <table>
            <thead><tr><th>Estudiante</th><th>Materia</th><th>Nota</th></tr></thead>
            <tbody id="tablaNotas"></tbody>
        </table>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
